<li id="todo-item-{{ todo.id }}">
    <span class="font-mono">{% if todo.due_on %}[{{ todo.due_on|date:"M d" }}]{% endif %}</span> {{ todo.task }}
    <button
        type="button"
        class="px-3 py-1 bg-red-600 hover:bg-red-700 text-sm text-white font-medium rounded-md shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500"
        hx-delete="{% url 'delete-todo' todo_id=todo.id %}"
        hx-target="#todo-item-{{ todo.id }}"
    >
        Delete
    </button>
</li>
